name: Axyntrax WhatsApp CI

on:
  push:
    branches: [ main, antigravity/* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests flask flask-cors google-generativeai python-dotenv fpdf2
    - name: Run Integration Tests
      run: |
        python test_ecosistema.py
    - name: Run IA Audit (Mock)
      run: |
        python advanced_integration/audit_2min_per_ia.py --cecilia http://localhost:5000/api/cecilia/test --output ./audit_reports || true
