kind = "web"
previewPath = "/tenant/"
title = "Cecilia · Tu negocio"
version = "1.0.0"
id = "artifacts/tenant"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/tenant/" ]
localPort = 24303

[services.development]
run = "pnpm --filter @workspace/tenant run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tenant", "run", "build" ]
publicDir = "artifacts/tenant/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24303"
BASE_PATH = "/tenant/"
