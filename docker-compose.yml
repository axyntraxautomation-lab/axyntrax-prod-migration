version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - API_PORT=5001
      - VERCEL=
      - AXYNTRAX_DISABLE_SQLITE=false
    restart: always

  frontend:
    build:
      context: ./axia-core
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:5001
    depends_on:
      - backend
    restart: always
