openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AXYNTRAX Dashboard Supremo — API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: clients
    description: CRM — clients & prospects
  - name: licenses
    description: License management (KeyGen)
  - name: dashboard
    description: Dashboard KPIs and summaries
  - name: twofa
    description: Two-factor authentication (TOTP)
  - name: ai
    description: AXYN CORE AI chat (Claude + Gemini)
  - name: inbox
    description: Unified omnichannel inbox (Web · Facebook · Instagram · WhatsApp · Gmail)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout the current session
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the currently authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/2fa/setup:
    post:
      operationId: setupTwofa
      tags: [twofa]
      summary: Generate a new TOTP secret and provisioning QR
      responses:
        "200":
          description: Provisioning data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TwofaSetupResponse"

  /auth/2fa/enable:
    post:
      operationId: enableTwofa
      tags: [twofa]
      summary: Verify code and enable 2FA for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TwofaEnableRequest"
      responses:
        "200":
          description: Enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/2fa/disable:
    post:
      operationId: disableTwofa
      tags: [twofa]
      summary: Disable 2FA for the current user (requires current code)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TwofaDisableRequest"
      responses:
        "200":
          description: Disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ai/chat:
    post:
      operationId: aiChat
      tags: [ai]
      summary: Stream a chat completion from Claude or Gemini (SSE)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiChatRequest"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List clients
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a new client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a client by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateClient
      tags: [clients]
      summary: Update a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /licenses:
    get:
      operationId: listLicenses
      tags: [licenses]
      summary: List licenses
      responses:
        "200":
          description: List of licenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/License"
    post:
      operationId: createLicense
      tags: [licenses]
      summary: Generate a new license key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LicenseCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/License"

  /dashboard/kpis:
    get:
      operationId: getDashboardKpis
      tags: [dashboard]
      summary: Get dashboard KPIs
      responses:
        "200":
          description: KPIs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardKpis"

  /conversations:
    get:
      operationId: listConversations
      tags: [inbox]
      summary: List conversations across all channels
      parameters:
        - in: query
          name: channel
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: assignedAgentId
          schema: { type: integer }
        - in: query
          name: limit
          schema: { type: integer, default: 100 }
      responses:
        "200":
          description: Conversation list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"

  /conversations/{id}:
    get:
      operationId: getConversation
      tags: [inbox]
      summary: Get a conversation with all its messages
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Conversation detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /conversations/{id}/messages:
    post:
      operationId: replyConversation
      tags: [inbox]
      summary: Send an outbound agent reply on a conversation
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplyConversationRequest"
      responses:
        "201":
          description: Message stored (and dispatched if provider connected)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /conversations/{id}/assign:
    post:
      operationId: assignConversation
      tags: [inbox]
      summary: Assign conversation to an agent
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignConversationRequest"
      responses:
        "200":
          description: Assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conversations/{id}/status:
    post:
      operationId: setConversationStatus
      tags: [inbox]
      summary: Change conversation status
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetStatusRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conversations/{id}/link-client:
    post:
      operationId: linkConversationClient
      tags: [inbox]
      summary: Attach (or detach) a CRM client to the conversation
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkClientRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /inbox/gmail/sync:
    post:
      operationId: syncGmail
      tags: [inbox]
      summary: Pull recent Gmail messages into the unified inbox
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GmailSyncResult"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Recent activity feed across the system
      responses:
        "200":
          description: Activity items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    UserRole:
      type: string
      enum: [admin, supervisor, agente]

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        twofaEnabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, name, email, role, twofaEnabled, createdAt]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        twofaCode:
          type: ["string", "null"]
      required: [email, password]

    AuthSession:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        requiresTwofa:
          type: ["boolean", "null"]
      required: [user]

    Conversation:
      type: object
      properties:
        id: { type: integer }
        clientId: { type: ["integer", "null"] }
        assignedAgentId: { type: ["integer", "null"] }
        channel: { type: string }
        externalId: { type: ["string", "null"] }
        contactName: { type: ["string", "null"] }
        contactHandle: { type: ["string", "null"] }
        subject: { type: ["string", "null"] }
        label: { type: ["string", "null"] }
        status: { type: string }
        unreadCount: { type: integer }
        lastMessageAt: { type: string, format: date-time }
        lastMessagePreview: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
      required:
        [
          id,
          channel,
          status,
          unreadCount,
          lastMessageAt,
          createdAt,
        ]

    Message:
      type: object
      properties:
        id: { type: integer }
        conversationId: { type: integer }
        direction: { type: string, enum: [inbound, outbound, system] }
        senderUserId: { type: ["integer", "null"] }
        senderName: { type: ["string", "null"] }
        externalMessageId: { type: ["string", "null"] }
        content: { type: string }
        mediaUrl: { type: ["string", "null"] }
        status: { type: string }
        errorMessage: { type: ["string", "null"] }
        sentAt: { type: string, format: date-time }
      required: [id, conversationId, direction, content, status, sentAt]

    ConversationDetail:
      type: object
      properties:
        conversation:
          $ref: "#/components/schemas/Conversation"
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
      required: [conversation, messages]

    ReplyConversationRequest:
      type: object
      properties:
        content: { type: string, minLength: 1 }
      required: [content]

    AssignConversationRequest:
      type: object
      properties:
        agentId: { type: ["integer", "null"] }
      required: [agentId]

    SetStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum: [nuevo, en_curso, esperando, resuelto, archivado]
      required: [status]

    LinkClientRequest:
      type: object
      properties:
        clientId: { type: ["integer", "null"] }
      required: [clientId]

    GmailSyncResult:
      type: object
      properties:
        fetched: { type: integer }
        upsertedConversations: { type: integer }
        insertedMessages: { type: integer }
        skipped: { type: integer }
      required:
        [fetched, upsertedConversations, insertedMessages, skipped]

    TwofaSetupResponse:
      type: object
      properties:
        secret:
          type: string
        otpauthUrl:
          type: string
        qrCodeDataUrl:
          type: string
      required: [secret, otpauthUrl, qrCodeDataUrl]

    TwofaEnableRequest:
      type: object
      properties:
        secret:
          type: string
        code:
          type: string
      required: [secret, code]

    TwofaDisableRequest:
      type: object
      properties:
        code:
          type: string
      required: [code]

    AiChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string
      required: [role, content]

    AiChatRequest:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/AiChatMessage"
        provider:
          type: string
          enum: [claude, gemini]
      required: [messages]

    ClientStage:
      type: string
      enum: [prospecto, demo_activa, negociacion, cliente, renovacion]

    Channel:
      type: string
      enum: [web, facebook, instagram, whatsapp, email, otro]

    Client:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        company:
          type: ["string", "null"]
        industry:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        channel:
          $ref: "#/components/schemas/Channel"
        stage:
          $ref: "#/components/schemas/ClientStage"
        score:
          type: integer
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required: [id, name, channel, stage, score, createdAt]

    ClientCreate:
      type: object
      properties:
        name:
          type: string
        company:
          type: ["string", "null"]
        industry:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        channel:
          $ref: "#/components/schemas/Channel"
        stage:
          $ref: "#/components/schemas/ClientStage"
        score:
          type: ["integer", "null"]
        notes:
          type: ["string", "null"]
      required: [name, channel]

    ClientUpdate:
      type: object
      properties:
        name:
          type: ["string", "null"]
        company:
          type: ["string", "null"]
        industry:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        channel:
          oneOf:
            - $ref: "#/components/schemas/Channel"
            - type: "null"
        stage:
          oneOf:
            - $ref: "#/components/schemas/ClientStage"
            - type: "null"
        score:
          type: ["integer", "null"]
        notes:
          type: ["string", "null"]

    LicenseType:
      type: string
      enum: [demo, plan_3m, plan_6m, plan_12m, plan_24m, addon]

    LicenseStatus:
      type: string
      enum: [activa, vencida, cancelada, pendiente]

    License:
      type: object
      properties:
        id:
          type: integer
        clientId:
          type: integer
        clientName:
          type: ["string", "null"]
        key:
          type: string
        type:
          $ref: "#/components/schemas/LicenseType"
        module:
          type: ["string", "null"]
        status:
          $ref: "#/components/schemas/LicenseStatus"
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        amount:
          type: ["number", "null"]
        currency:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required: [id, clientId, key, type, status, startDate, endDate, createdAt]

    LicenseCreate:
      type: object
      properties:
        clientId:
          type: integer
        type:
          $ref: "#/components/schemas/LicenseType"
        module:
          type: ["string", "null"]
        amount:
          type: ["number", "null"]
        currency:
          type: ["string", "null"]
      required: [clientId, type]

    DashboardKpis:
      type: object
      properties:
        leadsToday:
          type: integer
        salesMonth:
          type: number
        activeDemos:
          type: integer
        activeLicenses:
          type: integer
        expiringLicenses:
          type: integer
        totalClients:
          type: integer
        mrr:
          type: number
        conversionsByChannel:
          type: array
          items:
            $ref: "#/components/schemas/ChannelMetric"
        botStatuses:
          type: array
          items:
            $ref: "#/components/schemas/BotStatus"
      required:
        - leadsToday
        - salesMonth
        - activeDemos
        - activeLicenses
        - expiringLicenses
        - totalClients
        - mrr
        - conversionsByChannel
        - botStatuses

    ChannelMetric:
      type: object
      properties:
        channel:
          $ref: "#/components/schemas/Channel"
        leads:
          type: integer
        conversions:
          type: integer
      required: [channel, leads, conversions]

    BotStatus:
      type: object
      properties:
        name:
          type: string
        channel:
          $ref: "#/components/schemas/Channel"
        status:
          type: string
          enum: [online, offline, error]
        lastSeen:
          type: string
          format: date-time
      required: [name, channel, status, lastSeen]

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [lead, message, payment, license, alert]
        title:
          type: string
        description:
          type: ["string", "null"]
        channel:
          oneOf:
            - $ref: "#/components/schemas/Channel"
            - type: "null"
        timestamp:
          type: string
          format: date-time
      required: [id, type, title, timestamp]
