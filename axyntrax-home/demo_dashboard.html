<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AXYNTRAX 360 Dashboard - CLIENTE DIAMANTE</title>
    <style>
        :root {
            --bg: #050507;
            --sidebar: #0f0f12;
            --card: rgba(255, 255, 255, 0.03);
            --primary: #00d4ff;
            --accent: #7000ff;
            --success: #00ff88;
            --warn: #ffcc00;
            --text: #ffffff;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 300px; background: var(--sidebar); border-right: 1px solid rgba(255,255,255,0.1); padding: 20px; }
        .main { flex: 1; overflow-y: auto; padding: 30px; }
        
        .section-title { font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        
        .commercial-status { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .license-box { background: linear-gradient(45deg, #1a1a1a, #000); padding: 15px; border-radius: 10px; border: 1px solid var(--primary); font-family: monospace; color: var(--primary); font-size: 0.9rem; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .agent-card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .agent-card.active { border-left: 4px solid var(--success); }
        .agent-card.warn { border-left: 4px solid var(--warn); }
        
        .stat { font-size: 1.5rem; font-weight: bold; margin: 10px 0; color: var(--primary); }
        .label { font-size: 0.7rem; color: #888; }
        
        .neural-link { height: 4px; background: #222; border-radius: 2px; margin: 15px 0; overflow: hidden; }
        .neural-link-bar { height: 100%; background: var(--primary); width: 100%; animation: pulse 2s infinite; }
        
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="section-title">Comercial & Venta</div>
        <div class="commercial-status">
            <div class="label">CLIENTE</div>
            <div style="margin-bottom:10px">Inmobiliaria El Sol</div>
            <div class="label">PLAN</div>
            <div style="color:var(--success)">DIAMANTE OMNICHANNEL</div>
        </div>
        
        <div class="section-title">Licenciamiento (MATRIX)</div>
        <div class="license-box">
            KEY: AX-DIA-2026-X99-SOL<br>
            STATUS: ACTIVE<br>
            EXP: 2027-05-16
        </div>
        
        <div style="margin-top:40px" class="section-title">Auditoría Global</div>
        <div style="font-size:0.8rem">
            <div>Uptime: 99.9%</div>
            <div>Neural Load: 12%</div>
            <div>Active Agents: 7</div>
        </div>
    </div>
    
    <div class="main">
        <div class="section-title">Dashboard de Operaciones Neurales</div>
        <div class="grid" id="agent-grid">
            <!-- Agentes se cargan dinámicamente -->
        </div>
    </div>

    <script>
        const agents = ["Web", "WSP", "FB", "IG", "LI", "MARK", "TECH"];
        const grid = document.getElementById('agent-grid');
        agents.forEach(a => {
            const card = document.createElement('div');
            card.className = 'agent-card active';
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between">
                    <span style="font-weight:bold">Cecilia ${a}</span>
                    <span style="color:var(--success); font-size:0.6rem">● ONLINE</span>
                </div>
                <div class="neural-link"><div class="neural-link-bar"></div></div>
                <div class="label">TRAFICO ESTIMADO</div>
                <div class="stat">${Math.floor(Math.random()*500 + 100)} req/h</div>
                <div style="display:flex; justify-content:space-between">
                    <div class="label">LATENCIA: ${Math.floor(Math.random()*400 + 800)}ms</div>
                    <div class="label">LOAD: ${Math.floor(Math.random()*20 + 5)}%</div>
                </div>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
