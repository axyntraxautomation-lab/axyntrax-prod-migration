<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axyntrax Voice | Motor de Confirmación IA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
            overflow-x: hidden;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-circle {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
        }

        .title-h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 1.5rem;
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .stat-value { font-size: 2rem; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 0.875rem; color: #94a3b8; margin-top: 0.5rem; }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        button {
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4); }

        .logs-section {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .logs-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .log-item {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr 100px;
            align-items: center;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .log-item:hover { background: rgba(255, 255, 255, 0.03); }

        .status-pill {
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-align: center;
        }

        .status-calling { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .status-confirmed { background: rgba(34, 197, 94, 0.2); color: #4ade80; }

        .client-info { font-weight: 600; }
        .script-text { font-style: italic; color: #94a3b8; }
        .timestamp { color: #64748b; font-size: 0.8rem; }

        @media (max-width: 768px) {
            .log-item { grid-template-columns: 1fr 1fr; gap: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-section">
                <div class="logo-circle">AX</div>
                <h1 class="title-h1">Axyntrax Voice <span style="font-weight: 300; opacity: 0.6;">Admin</span></h1>
            </div>
            <div id="connection-status" style="font-size: 0.8rem; color: #4ade80;">● Motor Online</div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="total-calls">0</div>
                <div class="stat-label">Llamadas Hoy</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="confirmation-rate">0%</div>
                <div class="stat-label">Tasa Confirmación</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avg-duration">0s</div>
                <div class="stat-label">Duración Promedio</div>
            </div>
        </div>

        <div class="controls">
            <button onclick="triggerCall()">Simular Llamada IA</button>
            <button style="background: rgba(255,255,255,0.1);" onclick="refreshLogs()">Refrescar Logs</button>
        </div>

        <div class="logs-section">
            <div class="logs-header">
                <span>Historial de Llamadas</span>
                <span style="font-size: 0.8rem; color: #94a3b8;" id="last-update">Actualizado hace: 0s</span>
            </div>
            <div id="logs-container">
                <div style="padding: 3rem; text-align: center; color: #64748b;">No hay llamadas registradas en las últimas 24 horas.</div>
            </div>
        </div>
    </div>

    <script>
        async function refreshLogs() {
            try {
                const res = await fetch('/api/voice/logs');
                const data = await res.json();
                renderLogs(data);
                updateStats(data);
                document.getElementById('last-update').innerText = 'Actualizado hace: 0s';
            } catch (e) {
                console.error(e);
            }
        }

        function renderLogs(logs) {
            const container = document.getElementById('logs-container');
            if (!logs || logs.length === 0) {
                container.innerHTML = '<div style="padding: 3rem; text-align: center; color: #64748b;">Sin llamadas.</div>';
                return;
            }

            container.innerHTML = logs.map(log => `
                <div class="log-item">
                    <div class="client-info">${log.clientName}<br><span class="timestamp">${log.phone}</span></div>
                    <div class="script-text">"${log.script}"</div>
                    <div class="timestamp">${new Date(log.timestamp).toLocaleTimeString()}</div>
                    <div class="status-pill status-${log.status.toLowerCase()}">${log.status}</div>
                </div>
            `).join('');
        }

        function updateStats(logs) {
            document.getElementById('total-calls').innerText = logs.length;
            const confirmed = logs.filter(l => l.status === 'CONFIRMED').length;
            const rate = logs.length > 0 ? Math.round((confirmed / logs.length) * 100) : 0;
            document.getElementById('confirmation-rate').innerText = rate + '%';
        }

        async function triggerCall() {
            const names = ['Miguel Ramos', 'Ana García', 'Roberto Carlos', 'Lucía Pinedo'];
            const rubros = ['Dentista', 'Taller', 'Clínica', 'Veterinaria'];
            
            const randomClient = names[Math.floor(Math.random() * names.length)];
            const randomRubro = rubros[Math.floor(Math.random() * rubros.length)];

            try {
                await fetch('/api/voice/trigger', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        appointmentId: 'APP-' + Math.floor(Math.random() * 10000),
                        phone: '+51 991 740 590',
                        clientName: randomClient,
                        rubro: randomRubro,
                        dateTime: 'Hoy 4:00 PM'
                    })
                });
                setTimeout(refreshLogs, 500);
            } catch (e) {
                alert('Error al disparar llamada');
            }
        }

        setInterval(refreshLogs, 5000);
        refreshLogs();
    </script>
</body>
</html>
